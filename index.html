	<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>生日快乐</title>
    <style>
        html,body {
            margin:0;
            width:100%;
            height:100%;
            overflow:hidden;
            background:#000;
        }
    </style>
</head>
<body>

<!-- 正确写法：音频标签必须闭合！！！ -->
<audio id="bgm" loop src="HappyBirthday.mp3"></audio>

<!-- 动画画布 -->
<canvas class="canvas" style="position:absolute;width:100%;height:100%"></canvas>

<!-- 你的粒子动画 JS（正确路径） -->
<script src="index.js"></script>

<!-- 点击播放音乐 -->
<script>
document.addEventListener("click", function(){
    let audio = document.getElementById("bgm");
    audio.volume = 0.8;
    audio.play().catch(e=>{});
});
</script>

</body>
</html>﻿
